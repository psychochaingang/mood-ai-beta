name: Build VibeCheck APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Install system deps
      run: sudo apt update && sudo apt install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev cmake libffi-dev libssl-dev
    
    - name: Install buildozer
      run: pip install --user buildozer cython
    
    - name: Setup Android SDK
      run: |
        export PATH=$PATH:~/.local/bin
        # Buildozer will auto-download SDK, but we need to accept licenses
        yes | ~/.local/bin/buildozer android populate_sdk 2>&1 || true
        # Accept all Android SDK licenses
        if [ -d ~/.buildozer/android/platform/android-sdk ]; then
          yes | ~/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager --licenses 2>&1 || true
          yes | ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses 2>&1 || true
        fi
    
    - name: Build APK
      run: |
        cd mood_ai_app_project
        export PATH=$PATH:~/.local/bin
        # Force build even if SDK setup had issues
        buildozer android debug 2>&1
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: VibeCheck-APK
        path: mood_ai_app_project/bin/*.apk
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: mood_ai_app_project/bin/*.apk
        tag_name: beta-${{ github.run_number }}
        name: VibeCheck Beta #${{ github.run_number }}
        body: |
          ## VibeCheck Beta Build #${{ github.run_number }}
          Auto-built from latest source.
          Download the .apk below, install on your Android device.
