name: Build VibeCheck APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Install Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Install system deps
      run: sudo apt update && sudo apt install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev cmake libffi-dev libssl-dev
    
    - name: Install Android build-tools
      run: |
        yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "build-tools;34.0.0" "platforms;android-34" 2>&1 || true
        ls $ANDROID_SDK_ROOT/build-tools/34.0.0/ 2>/dev/null || echo "build-tools not found at expected path"
    
    - name: Install buildozer
      run: pip install --user buildozer cython
    
    - name: Build APK
      run: |
        cd mood_ai_app_project
        export PATH=$PATH:~/.local/bin:$ANDROID_SDK_ROOT:$ANDROID_SDK_ROOT/tools:$ANDROID_SDK_ROOT/tools/bin:$ANDROID_SDK_ROOT/platform-tools:$ANDROID_SDK_ROOT/build-tools/34.0.0
        export ANDROID_HOME=$ANDROID_SDK_ROOT
        buildozer android debug 2>&1
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: VibeCheck-APK
        path: mood_ai_app_project/bin/*.apk
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: mood_ai_app_project/bin/*.apk
        tag_name: beta-${{ github.run_number }}
        name: VibeCheck Beta #${{ github.run_number }}
        body: |
          ## VibeCheck Beta Build #${{ github.run_number }}
          Download the .apk below, install on your Android device.
