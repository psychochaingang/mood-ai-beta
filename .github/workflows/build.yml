name: Build VibeCheck APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: kivy/buildozer:latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Build APK inside Kivy Docker container
      run: |
        cd mood_ai_app_project
        buildozer android debug 2>&1
    
    - name: Upload APK
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: VibeCheck-APK
        path: mood_ai_app_project/bin/*.apk
